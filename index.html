<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#07101d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tadabbur" />
  <meta name="description" content="Layered Quran tafsir study companion with mushaf reading, classical tafasir, memorization tools, and seerah context." />
  <title>Tadabbur — تدبّر</title>
  <link rel="manifest" href="data:application/json,{%22name%22:%22Tadabbur%20—%20%D8%AA%D8%AF%D8%A8%D9%91%D8%B1%22,%22short_name%22:%22Tadabbur%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%2307101d%22,%22theme_color%22:%22%2307101d%22,%22description%22:%22Quran%20Tafsir%20Study%20Companion%22,%22icons%22:[{%22src%22:%22data:image/svg+xml,%253Csvg%2520xmlns%3D%27http%3A//www.w3.org/2000/svg%27%2520viewBox%3D%270%25200%2520192%2520192%27%253E%253Crect%2520fill%3D%27%252307101d%27%2520width%3D%27192%27%2520height%3D%27192%27%2520rx%3D%252732%27/%253E%253Ctext%2520x%3D%2796%27%2520y%3D%27120%27%2520font-size%3D%2780%27%2520text-anchor%3D%27middle%27%2520fill%3D%27%2523d3a94c%27%2520font-family%3D%27serif%27%253E%D8%AA%253C/text%253E%253C/svg%253E%22,%22sizes%22:%22192x192%22,%22type%22:%22image/svg+xml%22}]}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Amiri:ital,wght@0,400;0,700;1,400&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'QuranHafs';
      src: url('https://api.quranpedia.net/assets/fonts/hafs/hafs.woff2') format('woff2');
      font-display: swap;
    }
    :root{
      --bg:#07101d;
      --panel:#0d1b2f;
      --panel2:#10233e;
      --panel3:#132b4c;
      --text:#ebf1f7;
      --muted:#a9bdd5;
      --line:#234468;
      --gold:#d3a94c;
      --accent:#7ab8ff;
      --good:#57c77a;
      --warn:#ff8c66;
      --danger:#ff5d5d;
      --shadow:0 10px 30px rgba(0,0,0,.28);
      --radius:18px;
      --audio-h:70px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:radial-gradient(circle at top,#12305a 0,#07101d 35%,#050b13 100%);
      color:var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow:hidden;
    }
    button,select,input,textarea{font:inherit}
    .app{
      display:grid;
      grid-template-columns: 310px 1fr 420px;
      grid-template-rows:auto 1fr auto;
      grid-template-areas:
      "sidebar topbar drawer"
      "sidebar main drawer"
      "sidebar player drawer";
      height:100vh;
      gap:12px;
      padding:12px;
    }
    .card{
      background:linear-gradient(180deg,rgba(18,39,70,.96),rgba(11,25,44,.96));
      border:1px solid rgba(122,184,255,.14);
      border-radius:24px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(8px);
    }
    .sidebar{grid-area:sidebar;display:flex;flex-direction:column;overflow:hidden}
    .topbar{grid-area:topbar;padding:16px 18px;display:flex;gap:10px;align-items:center;justify-content:space-between;min-height:78px}
    .main{grid-area:main;overflow:auto;scroll-padding-bottom:calc(var(--audio-h) + 20px)}
    .player{grid-area:player;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;gap:16px;min-height:var(--audio-h);position:sticky;bottom:0}
    .drawer{grid-area:drawer;display:flex;flex-direction:column;overflow:hidden}

    .brand{padding:18px 18px 14px;border-bottom:1px solid rgba(122,184,255,.1)}
    .brand h1{margin:0;font-size:24px;line-height:1.05}
    .brand p{margin:8px 0 0;color:var(--muted);font-size:13px}
    .controls{padding:14px 14px 10px;border-bottom:1px solid rgba(122,184,255,.1);display:grid;gap:10px}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .search{
      width:100%;padding:12px 14px;border-radius:14px;border:1px solid rgba(122,184,255,.15);
      background:#0a1526;color:var(--text);outline:none
    }
    .pill, .ghostBtn, .solidBtn, .select{
      border-radius:14px;border:1px solid rgba(122,184,255,.18);background:#0b1730;color:var(--text)
    }
    .pill{padding:6px 12px;color:var(--muted);font-size:13px}
    .ghostBtn,.solidBtn{padding:10px 14px;cursor:pointer}
    .solidBtn{background:linear-gradient(180deg,#1b3f74,#15315a)}
    .select{padding:10px 12px;min-width:130px}
    .surahList{overflow:auto;padding:10px}
    .surahItem{
      padding:12px 14px;border-radius:16px;cursor:pointer;border:1px solid transparent;display:grid;gap:5px;
      margin-bottom:8px
    }
    .surahItem:hover{background:rgba(255,255,255,.03);border-color:rgba(122,184,255,.12)}
    .surahItem.active{background:rgba(122,184,255,.08);border-color:rgba(211,169,76,.45)}
    .surahTop{display:flex;justify-content:space-between;gap:8px;align-items:center}
    .surahName{font-size:20px;font-weight:700}
    .surahMeta{color:var(--muted);font-size:13px}
    .surahAr{font-family:'Amiri Quran', 'Scheherazade New', 'Amiri', 'QuranHafs', serif;font-size:28px;line-height:1}

    .topbar .leftMeta{display:grid;gap:6px}
    .titleLine{display:flex;align-items:end;justify-content:space-between;gap:16px}
    .titleLine h2{margin:0;font-size:42px;line-height:1}
    .titleLine .desc{max-width:380px;color:#bfd2e9;text-align:right;font-size:18px;line-height:1.35}
    .arabicTitle{font-family:'Amiri Quran','Scheherazade New','Amiri','QuranHafs',serif;font-size:56px;line-height:1}

    .readerWrap{padding:18px}
    .pageCard{padding:18px 22px 88px; position:relative}
    .bismillah{
      text-align:center;font-family:'Amiri Quran','Scheherazade New','Amiri','QuranHafs',serif;font-size:36px;line-height:1.6;margin:8px 0 18px;color:#f4f0e1
    }
    .mushafHeader{display:flex;justify-content:space-between;gap:20px;align-items:flex-start;padding:10px 8px 16px;border-bottom:1px solid rgba(122,184,255,.1);margin-bottom:18px}
    .mushafHeader .left{display:grid;gap:8px}
    .mushafHeader .metaRow{display:flex;gap:8px;flex-wrap:wrap}
    .pageNav{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-top:16px}
    .pageInput{width:82px;padding:10px 12px;border-radius:14px;border:1px solid rgba(122,184,255,.18);background:#0a1526;color:var(--text)}

    .ayahList{display:grid;gap:14px}
    .ayahRow{
      padding:12px 14px;border-radius:18px;border:1px solid rgba(122,184,255,.08);background:rgba(255,255,255,.015);
      cursor:pointer;transition:all .18s ease
    }
    .ayahRow:hover{background:rgba(255,255,255,.03);border-color:rgba(122,184,255,.2)}
    .ayahRow.selected{background:linear-gradient(180deg,rgba(74,120,189,.26),rgba(42,78,129,.24));border-color:rgba(211,169,76,.45)}
    .ayahArabicWrap{display:flex;align-items:flex-start;gap:12px;justify-content:space-between}
    .ayahArabic{font-family:'Amiri Quran','Scheherazade New','Amiri','QuranHafs',serif;font-size:36px;line-height:2.2;text-align:right;flex:1;word-wrap:break-word;letter-spacing:0.02em}
    .ayahTranslation{margin-top:8px;color:#d3deea;font-size:18px;line-height:1.6}
    .ayahHint{margin-top:8px;color:var(--muted);font-size:13px}
    .marker{
      width:44px;height:44px;border-radius:50%;border:1.5px solid var(--gold);display:grid;place-items:center;
      color:#f7d88b;font-size:16px;line-height:1;flex:0 0 auto;background:radial-gradient(circle at center,#13345c 0,#0c1f39 68%);
      box-shadow: inset 0 0 0 2px rgba(211,169,76,.12)
    }
    .marker::before{content:'✦';position:absolute;opacity:.18;font-size:34px;display:none}

    .audioMeta{display:grid;gap:4px;min-width:180px}
    .audioMeta .small{color:var(--muted);font-size:13px}
    .audioBtns{display:flex;gap:10px;align-items:center;justify-content:center;flex:1}
    .iconBtn{
      width:48px;height:48px;border-radius:50%;display:grid;place-items:center;border:1px solid rgba(122,184,255,.2);
      background:#10213c;color:var(--text);cursor:pointer;font-size:18px
    }
    .iconBtn.primary{background:linear-gradient(180deg,#214a85,#183863);border-color:rgba(211,169,76,.45)}
    .repeatWrap{display:flex;align-items:center;gap:8px;color:var(--muted)}
    .repeatWrap input{width:68px;padding:9px 10px;border-radius:12px;border:1px solid rgba(122,184,255,.18);background:#0a1526;color:var(--text)}

    .drawerHead{padding:16px 18px;border-bottom:1px solid rgba(122,184,255,.1);display:grid;gap:8px}
    .drawerBody{overflow:auto;padding:14px}
    .tabs{display:flex;gap:8px;flex-wrap:wrap}
    .tabBtn{padding:10px 14px;border-radius:14px;border:1px solid rgba(122,184,255,.18);background:#0b1730;color:var(--text);cursor:pointer}
    .tabBtn.active{border-color:rgba(211,169,76,.45);background:rgba(211,169,76,.08);color:#ffe5ac}
    .panel{display:none}
    .panel.active{display:block}
    .section{padding:14px;border-radius:18px;background:rgba(255,255,255,.02);border:1px solid rgba(122,184,255,.08);margin-bottom:12px}
    .section h3{margin:0 0 10px;font-size:16px;color:#ffd47b}
    .section h4{margin:0 0 8px;font-size:15px;color:#ffd47b}
    .section p,.section div,.section li{font-size:15px;line-height:1.65}
    .muted{color:var(--muted)}
    .arabicBlock{direction:rtl;text-align:right;font-family:'Amiri Quran','Scheherazade New','Amiri','QuranHafs',serif;font-size:22px;line-height:2}
    .bookList{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
    .bookBtn{padding:8px 10px;border-radius:12px;border:1px solid rgba(122,184,255,.16);background:#0d1d34;color:var(--text);cursor:pointer}
    .bookBtn.active{border-color:rgba(211,169,76,.45);background:rgba(211,169,76,.08)}
    .wordPills{display:flex;gap:8px;flex-wrap:wrap}
    .wordBtn{padding:8px 12px;border-radius:12px;border:1px solid rgba(122,184,255,.18);background:#0b1730;color:var(--text);cursor:pointer;font-family:'Amiri Quran','Scheherazade New','Amiri','QuranHafs',serif;font-size:26px;line-height:1.2}
    .journal{width:100%;min-height:110px;padding:12px 14px;border-radius:14px;border:1px solid rgba(122,184,255,.18);background:#0a1526;color:var(--text);resize:vertical}
    .savedTag{padding:5px 10px;border-radius:999px;background:rgba(122,184,255,.1);border:1px solid rgba(122,184,255,.14);cursor:pointer}
    .status{color:var(--muted);font-size:13px}
    .danger{color:#ffb0a3}

    .tajweed .t-ghn{color:#29d161}
    .tajweed .t-qlq{color:#25c6ff}
    .tajweed .t-madd{color:#ff9a3d}
    .tajweed .t-normal{color:#ff63a6}
    .tajweed .t-ikhf{color:#29d161}
    .tajweed .t-tfk{color:#4696ff}
    .tajweed .t-sln{color:#a7adb7}
    .tajweed .t-ham{color:#ff4f4f}
    .tajweed .t-idgh{color:#b84cff}

    .listenBox{display:grid;gap:10px}
    .listenControls{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .listenResult{padding:12px;border-radius:14px;background:#0a1526;border:1px solid rgba(122,184,255,.14);min-height:70px}
    .beep{display:none}

    a{color:#8fc7ff;text-decoration:none}
    a:hover{text-decoration:underline}

    .statsBar{display:flex;gap:8px;padding:12px 14px;border-bottom:1px solid rgba(122,184,255,.1)}
    .statBox{flex:1;text-align:center;padding:10px 6px;border-radius:14px;background:rgba(255,255,255,.02);border:1px solid rgba(122,184,255,.08)}
    .statNum{font-size:22px;font-weight:700;color:var(--gold);display:block;line-height:1.2}
    .statLabel{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:3px}
    .shareBar{display:flex;gap:8px;padding:8px 14px;border-bottom:1px solid rgba(122,184,255,.1)}
    .shareBtn{flex:1;padding:9px 14px;border-radius:14px;border:1px solid rgba(211,169,76,.3);background:rgba(211,169,76,.06);color:#ffe5ac;cursor:pointer;font-size:13px;font-weight:600;text-align:center;transition:all .15s}
    .shareBtn:hover{background:rgba(211,169,76,.14)}

    .skeleton{background:linear-gradient(90deg,rgba(255,255,255,.03) 25%,rgba(255,255,255,.06) 50%,rgba(255,255,255,.03) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:12px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .skeletonLine{height:16px;margin-bottom:10px;border-radius:8px}
    .skeletonBlock{height:80px;margin-bottom:12px;border-radius:14px}
    .skeletonArabic{height:50px;margin-bottom:14px;border-radius:12px}

    .seerahBox{padding:14px;border-radius:16px;background:rgba(87,199,122,.04);border:1px solid rgba(87,199,122,.14);margin-bottom:12px}
    .seerahBox h4{margin:0 0 8px;color:#57c77a;font-size:14px}
    .sababBox{padding:14px;border-radius:16px;background:rgba(211,169,76,.04);border:1px solid rgba(211,169,76,.14);margin-bottom:12px}
    .sababBox h4{margin:0 0 8px;color:#d3a94c;font-size:14px}
    .bookBadge{display:inline-block;padding:4px 10px;border-radius:8px;background:rgba(122,184,255,.06);border:1px solid rgba(122,184,255,.12);color:var(--muted);font-size:11px;margin:0 4px 4px 0}
    .ayahRow .playHint{opacity:0;transition:opacity .15s;font-size:12px;color:var(--gold)}
    .ayahRow:hover .playHint{opacity:1}

    @media (max-width: 1380px){
      .app{grid-template-columns:290px 1fr;grid-template-areas:"sidebar topbar" "sidebar main" "sidebar player";}
      .drawer{position:fixed;right:12px;top:12px;bottom:94px;width:min(430px,calc(100vw - 24px));z-index:30}
      .drawer.hidden{display:none}
    }
    @media (max-width: 920px){
      body{overflow:auto}
      .app{display:flex;flex-direction:column;height:auto;min-height:100vh;padding:10px}
      .sidebar{max-height:44vh}
      .topbar,.player,.drawer,.sidebar,.main{width:100%}
      .player{position:sticky;bottom:0;z-index:20}
      .drawer{position:static;max-height:none;display:block}
      .titleLine{display:grid}
      .titleLine h2{font-size:32px}
      .titleLine .desc{text-align:left;max-width:none;font-size:16px}
      .arabicTitle{font-size:42px}
      .ayahArabic{font-size:28px}
      .player{flex-direction:column;align-items:stretch}
      .audioBtns{justify-content:flex-start}
      .audioMeta{min-width:unset}
    }
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar card">
    <div class="brand">
      <h1>تدبّر — Tadabbur</h1>
      <p>Mushaf reading, layered tafsir, memorization, seerah context.</p>
    </div>
    <div class="controls">
      <div class="statsBar">
        <div class="statBox"><span class="statNum" id="statStreak">0</span><div class="statLabel">Streak</div></div>
        <div class="statBox"><span class="statNum" id="statStudied">0</span><div class="statLabel">Studied</div></div>
        <div class="statBox"><span class="statNum" id="statSaved">0</span><div class="statLabel">Saved</div></div>
      </div>
      <div class="shareBar">
        <button class="shareBtn" id="shareVerseBtn">↗ Share selected verse</button>
      </div>
      <input id="searchInput" class="search" placeholder="Search surah name or number" />
      <div class="row">
        <select id="themeSelect" class="select">
          <option value="dark">Dark</option>
          <option value="black">Black</option>
          <option value="light">Light</option>
          <option value="tajweed">Tajweed</option>
        </select>
        <select id="fontMode" class="select">
          <option value="uthmani">Uthmani</option>
          <option value="tajweed">Tajweed</option>
        </select>
      </div>
      <div class="row">
        <button id="fiveMinBtn" class="ghostBtn">5 min study</button>
        <button id="contextBtn" class="ghostBtn">Context mode</button>
      </div>
      <div class="row" id="savedCollectionsRow"></div>
    </div>
    <div class="surahList" id="surahList"></div>
  </aside>

  <header class="topbar card">
    <div class="leftMeta">
      <div class="titleLine">
        <h2 id="surahNameEn">Loading…</h2>
        <div class="desc" id="surahDescription">Preparing the page.</div>
      </div>
      <div class="arabicTitle" id="surahNameAr"></div>
      <div class="row" id="metaPills"></div>
    </div>
    <div class="row">
      <select id="translationSelect" class="select"></select>
      <select id="reciterSelect" class="select"></select>
      <button id="openDrawerBtn" class="solidBtn">Details</button>
    </div>
  </header>

  <main class="main">
    <div class="readerWrap">
      <div class="pageCard card">
        <div class="mushafHeader">
          <div class="left">
            <div class="row">
              <span class="pill" id="pagePill">Page 1 / 604</span>
              <span class="pill" id="juzPill"></span>
              <span class="pill" id="selectedPill">No ayah selected</span>
            </div>
            <div class="status" id="readerHint">Tap a verse for tafsir. Play starts from the selected ayah, otherwise from the first ayah shown.</div>
          </div>
          <div class="row">
            <button id="prevPageBtn" class="ghostBtn">← Prev page</button>
            <input id="pageInput" class="pageInput" type="number" min="1" max="604" value="1" />
            <button id="goPageBtn" class="ghostBtn">Go</button>
            <button id="nextPageBtn" class="ghostBtn">Next page →</button>
          </div>
        </div>
        <div id="bismillahBox" class="bismillah" hidden>﷽</div>
        <div id="ayahList" class="ayahList"></div>
      </div>
    </div>
  </main>

  <div class="player card">
    <div class="audioMeta">
      <div id="audioNowTitle">Audio</div>
      <div class="small" id="audioNowSub">Ready</div>
    </div>
    <div class="audioBtns">
      <button id="playBtn" class="iconBtn primary" title="Play">▶</button>
      <button id="pauseBtn" class="iconBtn" title="Pause">❚❚</button>
      <button id="stopBtn" class="iconBtn" title="Stop">■</button>
      <button id="nextAyahBtn" class="iconBtn" title="Next ayah">⏭</button>
    </div>
    <div class="repeatWrap">
      <span>Repeat</span>
      <input id="repeatCount" type="number" min="1" max="99" value="1" />
      <span>x</span>
    </div>
  </div>

  <aside class="drawer card hidden" id="drawer">
    <div class="drawerHead">
      <div class="row" style="justify-content:space-between;align-items:start;">
        <div>
          <div id="drawerTitle" style="font-size:30px;font-weight:700;line-height:1.2"></div>
          <div id="drawerSub" class="muted"></div>
        </div>
        <button id="drawerHideBtn" class="ghostBtn" title="Hide">×</button>
      </div>
      <div class="tabs" id="tabs"></div>
    </div>
    <div class="drawerBody">
      <section id="panel-translation" class="panel active"></section>
      <section id="panel-tafsir" class="panel"></section>
      <section id="panel-compare" class="panel"></section>
      <section id="panel-words" class="panel"></section>
      <section id="panel-deep" class="panel"></section>
      <section id="panel-reflect" class="panel"></section>
      <section id="panel-memorize" class="panel"></section>
      <section id="panel-links" class="panel"></section>
    </div>
  </aside>
</div>
<audio id="audioEl" preload="none"></audio>
<audio id="beepEl" class="beep"></audio>
<script>
const state = {
  chapters: [],
  currentSurah: 1,
  currentPage: 1,
  pageAyahs: [],
  selectedAyah: null,
  translations: [],
  selectedTranslation: 'en.asad',
  reciters: [],
  selectedReciter: 'ar.alafasy',
  tafsirBooks: [],
  selectedBooks: [],
  audioQueue: [],
  queueIndex: 0,
  queueRepeatRemaining: 1,
  repeatTarget: 1,
  drawerVisible: true,
  contextMode: 'default',
  fiveMin: false,
  topicsCache: null,
  speechRecognizer: null,
  speechActive: false,
  memTargetText: '',
  memLastResult: '',
  savedCollections: JSON.parse(localStorage.getItem('quran_saved_collections') || '{}'),
  journals: JSON.parse(localStorage.getItem('quran_journal_entries') || '{}'),
  surahInfoCache: {},
};

const els = {
  surahList: document.getElementById('surahList'),
  searchInput: document.getElementById('searchInput'),
  surahNameEn: document.getElementById('surahNameEn'),
  surahNameAr: document.getElementById('surahNameAr'),
  surahDescription: document.getElementById('surahDescription'),
  metaPills: document.getElementById('metaPills'),
  translationSelect: document.getElementById('translationSelect'),
  reciterSelect: document.getElementById('reciterSelect'),
  pagePill: document.getElementById('pagePill'),
  selectedPill: document.getElementById('selectedPill'),
  ayahList: document.getElementById('ayahList'),
  bismillahBox: document.getElementById('bismillahBox'),
  pageInput: document.getElementById('pageInput'),
  readerHint: document.getElementById('readerHint'),
  drawer: document.getElementById('drawer'),
  tabs: document.getElementById('tabs'),
  drawerTitle: document.getElementById('drawerTitle'),
  drawerSub: document.getElementById('drawerSub'),

function escapeHtml(s=''){return s.replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function stripDiacritics(s=''){return s.normalize('NFD').replace(/[\u064B-\u065F\u0670\u06D6-\u06ED]/g,'').replace(/[ـ]/g,'').replace(/\s+/g,' ').trim()}
function normalizeArabicForCompare(s=''){return stripDiacritics(s).replace(/[ٱآأإا]/g,'ا').replace(/ى/g,'ي').replace(/ة/g,'ه').replace(/ؤ/g,'و').replace(/ئ/g,'ي').replace(/[^\u0600-\u06FF\s]/g,'').replace(/\s+/g,' ').trim()}
function slugKey(surah,ayah){return `${surah}:${ayah}`}
function pageForSurah(surah){const ch=state.chapters.find(c=>c.id===surah); return ch?.pages?.[0] || ch?.page_start || 1}
function hasCountedBasmala(surah){return surah===1}
function shouldShowStandaloneBasmala(surah, pageAyahs){
  if (surah===1 || surah===9) return false;
  const first = pageAyahs[0];
  if (!first) return false;
  return first.number === 1;
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
function saveLocal(){localStorage.setItem('quran_saved_collections', JSON.stringify(state.savedCollections)); localStorage.setItem('quran_journal_entries', JSON.stringify(state.journals)); renderStats();}
function infoBrief(info){
  const intro = info?.introduction?.value || '';
  const type = info?.surah_type?.value || '';
  const topics = info?.topics?.value || '';
  const words = info?.words_count?.value || '';
  return [intro, type && `${type} revelation.`, topics, words && `${words} words.`].filter(Boolean).join(' ').slice(0,190);
}

async function apiJson(url){
  const res = await fetch(url);
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  return await res.json();
}

    name_simple: ch.name_simple,
    name_arabic: ch.name_arabic,
    translated_name: ch.translated_name?.name || '',
    revelation_place: ch.revelation_place,
    verses_count: ch.verses_count,
    pages: ch.pages,
  }));

  // Load translations for multiple languages
  const transRes = await apiJson('https://api.alquran.cloud/v1/edition?format=text&type=translation');
  const audioRes = await apiJson('https://api.alquran.cloud/v1/edition?format=audio&language=ar&type=versebyverse');

  const priorityTrans = ['en.asad','en.sahih','en.pickthall','en.yusufali','fr.hamidullah','es.cortes','ur.jalandhry','ur.maududi','tr.diyanet','id.indonesian','bn.bengali','ms.basmeih','hi.hindi','ru.kuliev','de.bubenheim','fa.makarem','ar.muyassar'];

    {identifier:'ar.husarymujawwad',englishName:'Al-Husary (Mujawwad)',name:'Husary Mujawwad'},
    {identifier:'ar.minshawimujawwad',englishName:'Al-Minshawi (Mujawwad)',name:'Minshawi Mujawwad'},

  mustHaveReciters.forEach(r=>{

  const edition = els.fontMode.value === 'tajweed' ? 'quran-tajweed' : 'quran-uthmani';
  const [arabicRes, transRes] = await Promise.all([
    apiJson(`https://api.alquran.cloud/v1/page/${state.currentPage}/${edition}`),
    apiJson(`https://api.alquran.cloud/v1/page/${state.currentPage}/${state.selectedTranslation}`)
  ]);
  const arabicAyahs = arabicRes.data?.ayahs || [];
  const transAyahs = transRes.data?.ayahs || [];
  state.pageAyahs = arabicAyahs.map((a, idx) => {
    const ref = typeof a.numberInSurah === 'number' ? `${a.surah.number}:${a.numberInSurah}` : `${a.surah.number}:${idx+1}`;
    return {
      surah: a.surah.number,
      surahName: a.surah.englishName,
      surahNameAr: a.surah.name,
      ayah: a.numberInSurah,
      number: a.number,
      globalNumber: a.number,
      page: a.page,
      juz: a.juz,
      hizbQuarter: a.hizbQuarter,
      text: a.text,
      translation: transAyahs[idx]?.text || '',
      ref,
    };
  }).filter(a => a.surah === state.currentSurah);

  if(!state.pageAyahs.length){
    const fallback = arabicAyahs.find(a => a.surah.number===state.currentSurah);
    if(fallback){

  updateSelectedUI();
  await updateHeader();
}

function parseTajweed(text=''){
  // AlQuran Cloud tajweed format: [code:number[arabic_text] or [code[arabic_text]
  // Example: [h:82[يَـٰٓأَيُّهَا] where h=tajweed rule, 82=ref number
  const map={
    h:'t-ikhf', s:'t-sln', l:'t-madd', n:'t-normal', p:'t-ghn', m:'t-idgh',
    q:'t-qlq', g:'t-ghn', i:'t-idgh', o:'t-madd', c:'t-tfk', f:'t-normal',
    w:'t-madd', a:'t-ham', u:'t-ikhf', d:'t-ghn', b:'t-normal', r:'t-qlq',
    t:'t-tfk', k:'t-normal', e:'t-normal', j:'t-normal', v:'t-normal',
    x:'t-normal', y:'t-normal', z:'t-normal'
  };
  // Use regex to parse all tagged segments
  // Pattern: [letter:digits[ ... ] or [letter[ ... ]
  let result = '';
  let pos = 0;
  while(pos < text.length){
    if(text[pos]==='['){
      // Try to match [code:number[content] or [code[content]
      const match = text.slice(pos).match(/^\[([a-z])(?::\d+)?\[/);
      if(match){
        const code = match[1];
        const cls = map[code]||'t-normal';
        const contentStart = pos + match[0].length;
        // Find the closing ]
        let depth = 1;
        let contentEnd = contentStart;
        while(contentEnd < text.length && depth > 0){
          if(text[contentEnd]==='[') depth++;
          else if(text[contentEnd]===']') depth--;
          if(depth > 0) contentEnd++;
        }
        const inner = text.slice(contentStart, contentEnd);
        result += `<span class="${cls}">${escapeHtml(inner)}</span>`;
        pos = contentEnd + 1;
        // Skip trailing ]
        if(pos < text.length && text[pos]===']') pos++;
        continue;
      }
      // Malformed — skip bracket
      pos++;
      continue;
    }
    if(text[pos]===']'){ pos++; continue; }
    result += escapeHtml(text[pos]);
    pos++;
  }
  return result.replace(/\s+/g,' ');
}

function renderPageAyahs(){
  const isTajweed = els.fontMode.value === 'tajweed';
  els.ayahList.innerHTML = state.pageAyahs.map(a => {
    const isSelected = state.selectedAyah === `${a.surah}:${a.ayah}`;
    const textHtml = isTajweed ? parseTajweed(a.text) : escapeHtml(a.text);
    const marker = `<div class="marker">${a.ayah}</div>`;
    return `
      <article class="ayahRow ${isSelected?'selected':''}" data-ref="${a.surah}:${a.ayah}">
        <div class="ayahArabicWrap">
          ${marker}
          <div class="ayahArabic ${isTajweed?'tajweed':''}">${textHtml}</div>
        </div>
        <div class="ayahTranslation">${escapeHtml(a.translation)}</div>
        <div class="ayahHint">${a.surah}:${a.ayah} <span class="playHint">tap to study</span></div>
      </article>`;
  }).join('');
  Array.from(els.ayahList.querySelectorAll('.ayahRow')).forEach(row => row.onclick = () => selectAyah(row.dataset.ref));
}

function updateSelectedUI(){
  const selected = getSelectedAyahObj();
  els.selectedPill.textContent = selected ? `Selected ayah ${selected.surah}:${selected.ayah}` : 'No ayah selected';
  const juzEl = document.getElementById('juzPill');
  if(juzEl && selected?.juz) juzEl.textContent = `Juz ${selected.juz}`;
  else if(juzEl && state.pageAyahs[0]?.juz) juzEl.textContent = `Juz ${state.pageAyahs[0].juz}`;
  Array.from(els.ayahList.querySelectorAll('.ayahRow')).forEach(el => el.classList.toggle('selected', el.dataset.ref === state.selectedAyah));
  if(selected){
    els.readerHint.textContent = `Play starts from ${selected.surah}:${selected.ayah}. Clicking play will not open tafsir.`;
    openDrawerIfNeeded();
    renderDrawer();
  }
}

function selectAyah(ref){
  state.selectedAyah = ref;
  updateSelectedUI();
}
function getSelectedAyahObj(){ return state.pageAyahs.find(a => `${a.surah}:${a.ayah}`===state.selectedAyah) || state.pageAyahs[0] || null; }

function buildQueue(){
  const startRef = state.selectedAyah || (state.pageAyahs[0] ? `${state.pageAyahs[0].surah}:${state.pageAyahs[0].ayah}` : null);
  if(!startRef){ state.audioQueue = []; return; }
  const startIdx = state.pageAyahs.findIndex(a => `${a.surah}:${a.ayah}`===startRef);
  state.audioQueue = state.pageAyahs.slice(startIdx);
  state.queueIndex = 0;
  state.repeatTarget = Math.max(1, Number(els.repeatCount.value || 1));
  state.queueRepeatRemaining = state.repeatTarget;
}

async function fetchAyahAudio(ref){
  try {
    // Primary: AlQuran Cloud API
    const data = await apiJson(`https://api.alquran.cloud/v1/ayah/${ref}/${state.selectedReciter}`);
    const url = data.data?.audio || data.data?.audioSecondary?.[0] || null;
    if(url) return url;
  } catch(e) {
    console.warn('Audio API failed:', e);
  }
  // Fallback: Direct CDN URL using ayah number
  try {
    // Get the global ayah number from our pageAyahs
    const [s,a] = ref.split(':').map(Number);
    const ayahData = state.pageAyahs.find(x => x.surah===s && x.ayah===a);
    if(ayahData){
      // Use verse-by-verse global number if available from the loaded data
      const globalNum = ayahData.globalNumber || null;
      if(globalNum){
        return `https://cdn.islamic.network/quran/audio/128/${state.selectedReciter}/${globalNum}.mp3`;
      }
    }
    // Last resort: fetch just to get the ayah number
    const numData = await apiJson(`https://api.alquran.cloud/v1/ayah/${ref}`);
    const num = numData.data?.number;
    if(num) return `https://cdn.islamic.network/quran/audio/128/${state.selectedReciter}/${num}.mp3`;
  } catch(e2) {
    console.warn('Audio fallback failed:', e2);
  }
  return null;
}

async function playCurrent(){
  if(!state.audioQueue.length) buildQueue();
  const item = state.audioQueue[state.queueIndex];
  if(!item) return;
  const ref = `${item.surah}:${item.ayah}`;
  state.selectedAyah = ref;
  updateSelectedUI();
  els.audioNowTitle.textContent = `${item.surahName} ${ref}`;
  els.audioNowSub.textContent = `Reciter: ${state.reciters.find(r=>r.identifier===state.selectedReciter)?.englishName || state.selectedReciter} • repeat ${state.repeatTarget}x`;
  try {
    const url = await fetchAyahAudio(ref);
    if(!url) throw new Error('No audio URL');
    els.audioEl.src = url;
    els.audioEl.onerror = () => {
      els.audioNowSub.textContent = `Audio failed for ${ref}. Try another reciter.`;
    };
    await els.audioEl.play();
  } catch(e){
    els.audioNowSub.textContent = `Audio failed for ${ref}. ${e.message || 'Try another reciter.'}`;
  }
}

function pauseAudio(){ els.audioEl.pause(); }
function stopAudio(){ els.audioEl.pause(); els.audioEl.currentTime = 0; }
function nextAyah(){
  if(!state.audioQueue.length) buildQueue();
  if(state.queueIndex < state.audioQueue.length - 1){
    state.queueIndex += 1;
    state.queueRepeatRemaining = state.repeatTarget;
    playCurrent();
  }
}
els.audioEl.addEventListener('ended', () => {
  if(state.queueRepeatRemaining > 1){
    state.queueRepeatRemaining -= 1;
    playCurrent();
    return;
  }
  if(state.queueIndex < state.audioQueue.length - 1){
    state.queueIndex += 1;
    state.queueRepeatRemaining = state.repeatTarget;
    playCurrent();
  }
});

async function loadTafsirBooks(surah){
  try {
    const data = await apiJson(`https://api.quranpedia.net/v1/surah/tafsirs/${surah}`);
    state.tafsirBooks = data || [];
  } catch { state.tafsirBooks = []; }
  // Fallback: add quran.com tafsirs if quranpedia returned nothing
  if(!state.tafsirBooks.length){
    state.tafsirBooks = [
      {id:'qurancom-ibn-kathir',name:'تفسير ابن كثير',short_name:'ابن كثير',author:'Ibn Kathir',source:'qurancom',resource_id:169},
      {id:'qurancom-tabari',name:'تفسير الطبري',short_name:'الطبري',author:'Al-Tabari',source:'qurancom',resource_id:15},
      {id:'qurancom-qurtubi',name:'تفسير القرطبي',short_name:'القرطبي',author:'Al-Qurtubi',source:'qurancom',resource_id:14},
      {id:'qurancom-saadi',name:'تفسير السعدي',short_name:'السعدي',author:'Al-Saadi',source:'qurancom',resource_id:170},
      {id:'qurancom-baghawi',name:'تفسير البغوي',short_name:'البغوي',author:'Al-Baghawi',source:'qurancom',resource_id:16},
      {id:'qurancom-muyassar',name:'التفسير الميسر',short_name:'الميسر',author:'Muyassar',source:'qurancom',resource_id:816},
      {id:'qurancom-waseet',name:'التفسير الوسيط',short_name:'الوسيط',author:'Wahba al-Zuhayli',source:'qurancom',resource_id:817},
      {id:'qurancom-jalalayn',name:'تفسير الجلالين',short_name:'الجلالين',author:'Jalalayn',source:'qurancom',resource_id:74},
    ];
  }
  const priority = ['ابن كثير','الطبري','القرطبي','السعدي','البغوي','الميسر','الجلالين','الوسيط'];
  state.tafsirBooks.sort((a,b)=>{
    const ai = priority.findIndex(p => (a.name||'').includes(p) || (a.short_name||'').includes(p));
    const bi = priority.findIndex(p => (b.name||'').includes(p) || (b.short_name||'').includes(p));
    return (ai===-1?999:ai) - (bi===-1?999:bi);
  });
  state.selectedBooks = state.tafsirBooks.slice(0, Math.min(4, state.tafsirBooks.length)).map(b=>b.id);
}

function openDrawerIfNeeded(){
  if(window.innerWidth <= 1380 && !state.drawerVisible){
    state.drawerVisible = true;
    els.drawer.classList.remove('hidden');
  }
}
function toggleDrawer(force){
  state.drawerVisible = typeof force==='boolean' ? force : !state.drawerVisible;

function linkHadiths(text=''){
  const patterns = [
    ['البخاري','bukhari'],['مسلم','muslim'],['الترمذي','tirmidhi'],['أبو داود','abudawud'],
    ['النسائي','nasai'],['ابن ماجه','ibnmajah'],['أحمد','ahmad'],['موطأ','malik'],
    ['الحاكم','hakim'],['البيهقي','bayhaqi'],['الطبراني','tabarani'],['الدارقطني','daraqutni'],
    ['Bukhari','Bukhari'],['Muslim','Muslim'],['Tirmidhi','Tirmidhi'],['Abu Dawud','Abu Dawud'],
    ['Nasa\'i','Nasai'],['Ibn Majah','Ibn Majah'],['Ahmad','Ahmad'],['Malik','Malik']
  ];
  let out = escapeHtml(text);
  patterns.forEach(([term,q]) => {
    const safeTerm = term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    out = out.replace(new RegExp(safeTerm,'g'), `<a target="_blank" rel="noopener noreferrer" href="https://sunnah.com/search?q=${encodeURIComponent(q)}">${term}</a>`);
  });
  return out;
}

async function fetchBookContent(surah, ayah, bookId){
  try {
    // quran.com fallback tafsirs
    if(typeof bookId === 'string' && bookId.startsWith('qurancom-')){
      const book = state.tafsirBooks.find(b=>b.id===bookId);
      if(!book) return null;
      const res = await apiJson(`https://api.quran.com/api/v4/tafsirs/${book.resource_id}/by_ayah/${surah}:${ayah}`);
      const text = (res?.tafsir?.text || '').replace(/<[^>]+>/g, '');
      return {content:[{text}]};
    }
    return await apiJson(`https://api.quranpedia.net/v1/ayah/${surah}/${ayah}/book/${bookId}`);
  } catch { return null; }
}

    </div>

  Array.from(panel.querySelectorAll('.bookBtn')).forEach(btn => btn.onclick = async () => {
    const id = Number(btn.dataset.book);
    state.selectedBooks = state.selectedBooks.includes(id) ? state.selectedBooks.filter(x=>x!==id) : [...state.selectedBooks,id];
    await renderTafsirPanel(ayah);
    await renderComparePanel(ayah);
  });

  const blocksEl = panel.querySelector('#tafsirBlocks');

  blocksEl.innerHTML = '<div class="section"><div class="muted">Loading tafsir content…</div></div>';
  const rendered = [];
  for (const book of selectedBooks){
    const data = await fetchBookContent(ayah.surah, ayah.ayah, book.id);
    const contents = data?.content || [];
    const text = contents.map(c => c.text).join('\n\n') || '';
    if(text){

      rendered.push(`<div class="section"><h3>${escapeHtml(book.name || book.short_name)}</h3><div class="muted">No content available for this ayah from this source.</div></div>`);
    }
  }
  blocksEl.innerHTML = rendered.join('');
}

async function renderComparePanel(ayah){
  const panel = document.getElementById('panel-compare');
  const books = state.tafsirBooks.filter(b => state.selectedBooks.includes(b.id)).slice(0,4);
  if(!books.length){ panel.innerHTML = '<div class="section"><div class="muted">Choose at least one tafsir in the Tafasir tab.</div></div>'; return; }
  panel.innerHTML = '<div class="section"><div class="muted">Loading comparison…</div></div>';
  const snippets=[];
  for(const book of books){
    const data = await fetchBookContent(ayah.surah, ayah.ayah, book.id);
    const text = (data?.content || []).map(c=>c.text).join(' ').replace(/\s+/g,' ').trim();
    snippets.push({book,text});
  }
  const agreements = [];
  const differences = [];
  const reasonHints = [];
  const joined = snippets.map(s=>s.text).filter(Boolean).join(' ');
  if(!joined){ panel.innerHTML = '<div class="section"><div class="muted">No tafsir content loaded to compare. Toggle books in the Tafasir tab.</div></div>'; return; }
  if(/سبب نزول|نزلت|نزول|فنزلت/i.test(joined)) agreements.push('Multiple sources reference revelation context for this ayah.');
  if(/حكم|فرض|واجب|حرام|يجوز|لا يجوز/i.test(joined)) agreements.push('Legal rulings are discussed across the selected material.');
  if(/إجماع|اتفق|أجمعوا/i.test(joined)) agreements.push('The sources mention scholarly consensus on at least one point.');
  if(snippets.filter(s=>s.text.length>100).length>1) differences.push('The selected books vary in depth and emphasis. Compare their treatment side by side in the Tafasir tab.');
  if(/اختلف|خلاف|قيل|والقول الثاني|وذهب|وقال آخرون/i.test(joined)) differences.push('Explicit scholarly disagreement (ikhtilaf) is recorded in the loaded material.');
  if(/لغة|بلاغة|نحو|إعراب/i.test(joined)) reasonHints.push('Some differences arise from linguistic or grammatical analysis (إعراب).');
  if(/الشافعي|الحنفي|المالكي|الحنبلي|أبو حنيفة/i.test(joined)) reasonHints.push('Madhhab-specific legal derivations appear in the selected sources.');
  if(/رواية|إسناد|سند|حديث ضعيف|حديث صحيح/i.test(joined)) reasonHints.push('Narration authenticity (isnad) is a factor in differing interpretations.');
  panel.innerHTML = `
    <div class="section"><h3>Points of agreement</h3><ul>${agreements.length?agreements.map(x=>`<li>${escapeHtml(x)}</li>`).join(''):'<li>No shared points auto-detected yet. Enable more tafasir for better comparison.</li>'}</ul></div>
    <div class="section"><h3>Points of difference</h3><ul>${differences.length?differences.map(x=>`<li>${escapeHtml(x)}</li>`).join(''):'<li>No ikhtilaf markers detected. Try adding more books.</li>'}</ul></div>
    <div class="section"><h3>Why scholars may differ</h3><ul>${reasonHints.length?reasonHints.map(x=>`<li>${escapeHtml(x)}</li>`).join(''):'<li>Common reasons: lexical ambiguity, narration strength, usul al-fiqh methodology, or rhetorical emphasis.</li>'}</ul></div>
    <div class="section"><h3>Summary of loaded sources</h3><div>${snippets.filter(s=>s.text).map(s=>`<div style="margin-bottom:10px"><div style="font-weight:600;color:var(--gold);margin-bottom:4px">${escapeHtml(s.book.short_name||s.book.name)}</div><div class="muted" style="font-size:13px">${s.text.length} characters loaded</div></div>`).join('')}</div></div>`;
}

function tokenizeArabicWords(text=''){
  return stripDiacritics(text).replace(/[^\u0600-\u06FF\s]/g,' ').split(/\s+/).filter(Boolean);
}

async function renderDeepPanel(ayah){
  const panel = document.getElementById('panel-deep');
  panel.innerHTML = '<div class="section"><div class="muted">Loading deep analysis from selected tafasir…</div></div>';
  const info = await getSurahInfo(ayah.surah);
  const tafsirData = [];
  const booksToLoad = state.tafsirBooks.filter(b=>state.selectedBooks.includes(b.id)).slice(0,4);
  for(const b of booksToLoad){
    const data = await fetchBookContent(ayah.surah, ayah.ayah, b.id);
    tafsirData.push({book:b, text:(data?.content||[]).map(c=>c.text).join(' ')});
  }
  const sourceText = tafsirData.map(x=>x.text).join(' ');
  const words = tokenizeArabicWords(ayah.text);
  const uniqueWords = Array.from(new Set(words));

  // Extract root-level data
  const rootSection = uniqueWords.length ? `
    <div class="section"><h3>Key words (${uniqueWords.length})</h3>
      <div class="wordPills">${uniqueWords.slice(0,15).map(w=>`<span class="pill" style="font-family:'Amiri Quran','Scheherazade New','Amiri','QuranHafs',serif;font-size:20px">${escapeHtml(w)}</span>`).join('')}</div>
      <div class="muted" style="margin-top:8px">Use the Words tab to search each word across the entire Quran.</div>
    </div>` : '';

  // Linguistic signals
  const hasLangFocus = /لغة|بلاغة|إعراب|نحو|صرف|اشتقاق/i.test(sourceText);
  const hasQiraat = /قراءة|قرأ|قراءات|حفص|ورش|قالون/i.test(sourceText);

  // Sabab detection
  const hasSabab = /سبب نزول|نزلت (هذه|في)|أنزل الله|فنزلت/i.test(sourceText);
  let sababExcerpt = '';
  if(hasSabab){
    const match = sourceText.match(/(سبب نزول|نزلت|أنزل الله|فنزلت)[^.،]*[.،]/);
    if(match) sababExcerpt = match[0];
  }

  // Legal signals
  const legalTerms = [];
  const legalPatterns = [
    ['صلاة','Prayer'],['زكاة','Zakat'],['صيام','Fasting'],['حج','Hajj'],
    ['نكاح','Marriage'],['طلاق','Divorce'],['ميراث','Inheritance'],['ربا','Riba'],
    ['بيع','Trade'],['عدة','Iddah'],['حد','Hadd'],['جهاد','Jihad'],['حلال','Halal'],['حرام','Haram']
  ];
  legalPatterns.forEach(([ar,en])=>{ if(sourceText.includes(ar)) legalTerms.push(`${en} (${ar})`); });

  // Madhhab detection
  const madhahib = [];
  if(/الشافعي|شافعي/i.test(sourceText)) madhahib.push("Shafi'i");
  if(/الحنفي|حنفي|أبو حنيفة/i.test(sourceText)) madhahib.push('Hanafi');
  if(/المالكي|مالكي|مالك/i.test(sourceText)) madhahib.push('Maliki');
  if(/الحنبلي|حنبلي|أحمد/i.test(sourceText)) madhahib.push('Hanbali');

  // Hadith detection
  const hadithCollections = [];
  const hadithPatterns = [
    ['البخاري','Bukhari'],['مسلم','Muslim'],['الترمذي','Tirmidhi'],
    ['أبو داود','Abu Dawud'],['النسائي','Nasai'],['ابن ماجه','Ibn Majah'],
    ['أحمد','Ahmad'],['موطأ','Muwatta'],['الحاكم','Al-Hakim'],['البيهقي','Al-Bayhaqi']
  ];
  hadithPatterns.forEach(([ar,en])=>{ if(sourceText.includes(ar)) hadithCollections.push({ar,en}); });

  // Ikhtilaf detection
  const hasIkhtilaf = /اختلف|خلاف|قيل|وقال آخرون|والقول الثاني|وذهب/i.test(sourceText);

  // Revelation context
  const revInfo = info?.revelation?.value || info?.surah_type?.value || '';

  panel.innerHTML = `
    ${rootSection}
    <div class="section"><h3>Linguistic signals</h3>
      <div>${hasLangFocus ? 'The selected tafasir contain explicit linguistic analysis (إعراب / بلاغة / صرف) for this ayah.' : 'No explicit linguistic analysis detected in the currently selected tafasir. Try enabling more books, especially al-Zamakhshari or al-Razi.'}</div>
      ${hasQiraat ? '<div style="margin-top:8px">Qira\'at variant readings are mentioned in the loaded material.</div>' : ''}
    </div>
    <div class="section"><h3>Asbab al-Nuzul</h3>
      ${hasSabab ? `<div>Revelation context is mentioned in the selected tafasir.</div>${sababExcerpt ? `<div class="arabicBlock" style="margin-top:8px;font-size:18px;line-height:1.8">${linkHadiths(sababExcerpt)}</div>` : ''}` : `<div>No ayah-specific sabab detected in the selected material.</div>`}
      ${revInfo ? `<div class="muted" style="margin-top:8px">Surah-level: ${escapeHtml(revInfo)}</div>` : ''}
    </div>
    <div class="section"><h3>Scholar disagreement (اختلاف)</h3>
      <div>${hasIkhtilaf ? 'The loaded tafasir record scholarly disagreement on this ayah. This typically arises from linguistic ambiguity, variant narrations, or differing usul al-fiqh approaches.' : 'No explicit ikhtilaf markers detected. This doesn\'t mean there\'s consensus — enable more books to check.'}</div>
    </div>
    <div class="section"><h3>Fiqh and legal implications</h3>
      ${legalTerms.length ? `<div>Legal terms detected: ${legalTerms.join(', ')}</div>` : '<div>No direct legal terminology detected in the selected material.</div>'}
      ${madhahib.length ? `<div style="margin-top:8px">Madhahib mentioned: ${madhahib.join(', ')}</div>` : ''}
    </div>
    <div class="section"><h3>Hadith references</h3>
      ${hadithCollections.length ? `<div>${hadithCollections.map(h=>`<a target="_blank" rel="noopener noreferrer" href="https://sunnah.com/search?q=${encodeURIComponent(h.en)}" style="margin-right:10px">${escapeHtml(h.ar)} (${h.en})</a>`).join('<br>')}</div>` : '<div>No hadith collection names detected in the selected material.</div>'}
    </div>
    ${(()=>{
      const seerah = getSeerahContext(ayah.surah);
      return seerah ? `<div class="seerahBox"><h4>⏳ Seerah Context — ${escapeHtml(seerah.period)}</h4><div style="font-size:14px;line-height:1.7">${escapeHtml(seerah.detail)}</div></div>` : '';
    })()}
    <div class="section"><h3>Reading guidance</h3>
      <div>Study this ayah through four lenses: (1) wording and grammar, (2) revelation context, (3) creed implications, (4) legal rulings. Where the scholars converge, hold that firmly. Where they diverge, understand whether the difference is lexical, narrational, or jurisprudential.</div>
    </div>`;
}

function compareWordSets(target, spoken){
  const t = normalizeArabicForCompare(target).split(' ').filter(Boolean);
  const s = normalizeArabicForCompare(spoken).split(' ').filter(Boolean);
  const missing = t.filter(w => !s.includes(w));
  const extra = s.filter(w => !t.includes(w));
  const score = Math.max(0, Math.round(100 * (1 - (missing.length + extra.length) / Math.max(1,t.length))));
  return {missing,extra,score};
}

function beep(){
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination); o.type='sine'; o.frequency.value=880; g.gain.value=0.05; o.start(); setTimeout(()=>{o.stop();ctx.close();},160);
}

      <h4 style="color:var(--gold)">Repeat practice</h4>
      <div class="row" style="margin-top:4px">
        <span>Repeat</span>
        <input id="memRepeat" type="number" min="1" max="20" value="3" style="width:60px;padding:8px;border-radius:10px;border:1px solid rgba(122,184,255,.18);background:#0a1526;color:var(--text)" />
        <span>times</span>
        <button id="memRepeatBtn" class="solidBtn">Loop</button>
      </div>
      <div id="memRepeatStatus" class="muted" style="margin-top:8px"></div>
    </div>`;
  const arabicBlock = panel.querySelector('#memArabicBlock');
  panel.querySelector('#memHideBtn').onclick = () => {
    arabicBlock.style.filter = 'blur(12px)';
    arabicBlock.style.userSelect = 'none';
    panel.querySelector('#memHideBtn').style.display = 'none';
    panel.querySelector('#memShowBtn').style.display = '';
  };
  panel.querySelector('#memShowBtn').onclick = () => {
    arabicBlock.style.filter = '';
    arabicBlock.style.userSelect = '';
    panel.querySelector('#memShowBtn').style.display = 'none';
    panel.querySelector('#memHideBtn').style.display = '';
  };
  panel.querySelector('#memListenBtn').onclick = async () => {
    try {
      const ref = `${ayah.surah}:${ayah.ayah}`;
      const d = await apiJson(`https://api.alquran.cloud/v1/ayah/${ref}/${state.selectedReciter}`);
      if(d.data?.audio){ els.audioEl.src = d.data.audio; await els.audioEl.play(); }
    } catch {}
  };
  panel.querySelector('#memRepeatBtn').onclick = async () => {
    const count = Math.max(1, Math.min(20, Number(panel.querySelector('#memRepeat').value)||3));
    const status = panel.querySelector('#memRepeatStatus');
    try {
      const ref = `${ayah.surah}:${ayah.ayah}`;
      const d = await apiJson(`https://api.alquran.cloud/v1/ayah/${ref}/${state.selectedReciter}`);
      const url = d.data?.audio;
      if(!url){ status.textContent = 'No audio.'; return; }
      for(let i = 0; i < count; i++){
        status.textContent = `Playing ${i+1} of ${count}...`;
        await new Promise(resolve => { els.audioEl.src = url; els.audioEl.onended = resolve; els.audioEl.play().catch(resolve); });
        if(i < count-1) await sleep(800);
      }
      status.textContent = `Done (${count}x).`;
    } catch { status.textContent = 'Loop failed.'; }
  };
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null;
  if(SpeechRecognition){
    recognition = new SpeechRecognition();
    recognition.lang = 'ar-SA';
    recognition.interimResults = true;
    recognition.continuous = true;
    recognition.onresult = (event) => {
      const transcript = Array.from(event.results).map(r => r[0].transcript).join(' ');
      state.memLastResult = transcript;
      const cmp = compareWordSets(ayah.text, transcript);
      const box = panel.querySelector('#memResult');
      const color = cmp.score >= 85 ? 'var(--good)' : cmp.score >= 60 ? 'var(--warn)' : 'var(--danger)';
      box.innerHTML = `<div style="font-size:18px;font-weight:700;color:${color};margin-bottom:8px">${cmp.score}% match</div><div><b>Heard:</b> <span style="font-family:\'Amiri Quran\',\'Scheherazade New\',serif;font-size:20px;direction:rtl">${escapeHtml(transcript||'...')}</span></div>${cmp.missing.length?`<div style="margin-top:8px"><b>Missing:</b> <span style="color:var(--danger)">${cmp.missing.slice(0,8).join(' ')}</span></div>`:''}${cmp.score>=85?'<div style="margin-top:8px;color:var(--good);font-weight:600">Excellent!</div>':''}`;
      if(cmp.score < 70) beep();
    };
    recognition.onerror = () => { panel.querySelector('#memResult').innerHTML = '<div class="danger">Speech recognition error.</div>'; };
  }
  panel.querySelector('#memStartBtn').onclick = () => {
    if(!recognition){ panel.querySelector('#memResult').innerHTML = '<div class="danger">Speech recognition unavailable. Use Chrome.</div>'; return; }
    panel.querySelector('#memResult').innerHTML = '<div class="muted">Listening...</div>';
    panel.querySelector('#memStartBtn').textContent = 'Recording...';
    recognition.start();
  };
  panel.querySelector('#memStopBtn').onclick = () => {
    if(recognition) recognition.stop();
    panel.querySelector('#memStartBtn').textContent = 'Start recording';
  };
}

async function ensureTopics(){
  if(state.topicsCache) return state.topicsCache;
  try { state.topicsCache = await apiJson('https://api.quranpedia.net/v1/topics'); } catch { state.topicsCache = []; }
  return state.topicsCache;
}

async function renderLinksPanel(ayah){
  const panel = document.getElementById('panel-links');
  panel.innerHTML = '<div class="section"><div class="muted">Loading cross-links…</div></div>';
  const topics = await ensureTopics();
  const topicHits = (topics || []).filter(t => String(t.ayahs || '').includes(`${ayah.surah}:${ayah.ayah}`)).slice(0,12);
  const info = await getSurahInfo(ayah.surah);
  const seerah = getSeerahContext(ayah.surah);
  // Hadith from surah info + loaded tafsir
  const hadithSet = new Set();
  const infoText = [info?.prophet?.value||'', info?.grace?.value||'', info?.topics?.value||''].join(' ');
  let tafsirText = '';
  for(const b of state.tafsirBooks.filter(b=>state.selectedBooks.includes(b.id)).slice(0,2)){
    const d = await fetchBookContent(ayah.surah, ayah.ayah, b.id);
    tafsirText += (d?.content||[]).map(c=>c.text).join(' ') + ' ';
  }
  const combined = infoText + ' ' + tafsirText;
  [['البخاري','Bukhari'],['مسلم','Muslim'],['الترمذي','Tirmidhi'],['أبو داود','Abu Dawud'],['النسائي','Nasai'],['ابن ماجه','Ibn Majah'],['أحمد','Ahmad'],['موطأ','Muwatta'],['الحاكم','Al-Hakim'],['البيهقي','Al-Bayhaqi']].forEach(([ar,en])=>{ if(combined.includes(ar)) hadithSet.add(en); });
  panel.innerHTML = `
    ${seerah ? `<div class="seerahBox"><h4>Seerah Context — ${escapeHtml(seerah.period)}</h4><div style="font-size:14px;line-height:1.7">${escapeHtml(seerah.detail)}</div></div>` : ''}
    <div class="section"><h3>Topics</h3><div>${topicHits.length ? topicHits.map(t => `<span class="savedTag">${escapeHtml(t.name)}</span>`).join(' ') : '<span class="muted">No topic tags found.</span>'}</div></div>
    <div class="section"><h3>Surah context</h3>
      ${info?.topics?.value ? `<div style="margin-bottom:6px">${escapeHtml(info.topics.value)}</div>` : ''}
      ${info?.purposes?.value ? `<div style="margin-bottom:6px">${escapeHtml(info.purposes.value)}</div>` : ''}
      ${info?.revelation?.value ? `<div class="muted">${escapeHtml(info.revelation.value)}</div>` : '<div class="muted">No surah context available.</div>'}
    </div>
    <div class="section"><h3>Hadith references</h3>
      ${hadithSet.size ? Array.from(hadithSet).map(h => `<div style="margin-bottom:6px"><a target="_blank" rel="noopener noreferrer" href="https://sunnah.com/search?q=${encodeURIComponent(h)}">${h} on Sunnah.com</a></div>`).join('') : '<span class="muted">No hadith collection names detected.</span>'}
    </div>
    <div class="section"><h3>External resources</h3>
      <div style="display:grid;gap:6px">
        <a target="_blank" rel="noopener noreferrer" href="https://quran.com/${ayah.surah}:${ayah.ayah}">View on Quran.com</a>
        <a target="_blank" rel="noopener noreferrer" href="https://corpus.quran.com/wordbyword.jsp?chapter=${ayah.surah}&verse=${ayah.ayah}">Word-by-word (Corpus)</a>
      </div>
    </div>`;
}

function renderSavedCollections(){
  const names = Object.keys(state.savedCollections);
  els.savedCollectionsRow.innerHTML = names.length ? names.slice(0,6).map(n => `<span class="savedTag" data-tag="${escapeHtml(n)}">${escapeHtml(n)}</span>`).join('') : '<span class="status">No saved collections yet</span>';
  Array.from(els.savedCollectionsRow.querySelectorAll('.savedTag')).forEach(tag => tag.onclick = () => {
    const key = tag.dataset.tag;
    const firstRef = state.savedCollections[key]?.[0];
    if(firstRef){ const [s,a] = firstRef.split(':').map(Number); loadSurah(s).then(()=>selectAyah(`${s}:${a}`)); }

function fiveMinStudy(){
  state.fiveMin = true;
  // Pick a random verse from popular study surahs if no page is loaded
  const studySurahs = [1,2,3,18,19,29,36,55,56,67,73,78,87,93,94,103,112];
  if(!state.pageAyahs.length){
    const pick = studySurahs[Math.floor(Math.random()*studySurahs.length)];
    loadSurah(pick).then(()=>{
      const random = state.pageAyahs[Math.floor(Math.random() * Math.max(1,state.pageAyahs.length))];
      if(random) selectAyah(`${random.surah}:${random.ayah}`);
      setTab('reflect');
      els.readerHint.textContent = '5-min study: read the verse, check the tafsir, write a reflection. Done.';
    });
  } else {
    const random = state.pageAyahs[Math.floor(Math.random() * Math.max(1,state.pageAyahs.length))] || getSelectedAyahObj();
    if(random) selectAyah(`${random.surah}:${random.ayah}`);
    setTab('reflect');
    els.readerHint.textContent = '5-min study: read the verse, check the tafsir, write a reflection. Done.';
  }
}

function contextMode(){
  const mode = prompt('Context mode:\n• ramadan — fasting & Laylat al-Qadr\n• hardship — sabr, tawakkul, relief\n• pregnancy — Maryam, family, childbirth\n• death — afterlife, burial, grief\n• rizq — provision, trust in Allah\n• marriage — nikah, rights, family', state.contextMode);
  if(!mode) return;
  state.contextMode = mode.toLowerCase().trim();
  const routes = {
    ramadan: {surah:2, desc:'Al-Baqarah — contains the verses of fasting (183-187) and Laylat al-Qadr'},
    hardship: {surah:94, desc:'Ash-Sharh — "With hardship comes ease." Also try Al-Ankabut (29) on trials.'},
    pregnancy: {surah:19, desc:'Maryam — the story of Maryam\'s pregnancy and the birth of Isa.'},
    death: {surah:36, desc:'Ya-Sin — the Prophet ﷺ said: "Recite Ya-Sin over your dying ones."'},
    rizq: {surah:56, desc:'Al-Waqi\'ah — "Whoever recites it every night shall never be afflicted by poverty."'},
    marriage: {surah:4, desc:'An-Nisa — comprehensive guidance on marriage, rights, and family.'},
    dua: {surah:2, desc:'Al-Baqarah — contains numerous supplications including verse 286.'},
    tawbah: {surah:39, desc:'Az-Zumar — "O My servants who have transgressed against themselves, do not despair of the mercy of Allah."'},
  };
  const route = routes[state.contextMode];
  if(route){
    loadSurah(route.surah);
    els.readerHint.textContent = `Context: ${route.desc}`;
  } else {
    // Try to find surah by name match
    const result = state.chapters.filter(ch =>
      ch.name_simple.toLowerCase().includes(state.contextMode) ||
      ch.translated_name.toLowerCase().includes(state.contextMode)
    );
    if(result[0]) loadSurah(result[0].id);
    else els.readerHint.textContent = `No matching context found for "${state.contextMode}". Try: ramadan, hardship, pregnancy, death, rizq, marriage, dua, tawbah.`;
  }
}

// ========== GAMIFICATION ==========
function loadStats(){
  try{const d=JSON.parse(localStorage.getItem('quran_study_stats')||'{}');
    state.stats={streak:d.streak||0,studied:d.studied||0,lastDate:d.lastDate||''};
  }catch{state.stats={streak:0,studied:0,lastDate:''};}
  renderStats();
}
function saveStats(){
  try{localStorage.setItem('quran_study_stats',JSON.stringify(state.stats));}catch{}
  renderStats();
}
function trackStudy(){
  const today=new Date().toDateString();
  if(state.stats.lastDate!==today){state.stats.streak+=1;state.stats.lastDate=today;}
  state.stats.studied+=1;
  saveStats();
}
function renderStats(){
  const el=id=>document.getElementById(id);
  if(el('statStreak'))el('statStreak').textContent=state.stats?.streak||0;
  if(el('statStudied'))el('statStudied').textContent=state.stats?.studied||0;
  const savedCount=Object.values(state.savedCollections).reduce((a,b)=>a+(b?.length||0),0);
  if(el('statSaved'))el('statSaved').textContent=savedCount;
}

function shareCurrentVerse(){
  const ayah=getSelectedAyahObj();
  if(!ayah){alert('Select a verse first.');return;}
  const lines=[
    `📖 ${ayah.surahName} ${ayah.surah}:${ayah.ayah}`,
    '',
    ayah.text,
    '',
    ayah.translation,
    '',
    '— Tadabbur • Qur\'an Tafsir Study Companion'
  ];
  const txt=lines.join('\n');
  if(navigator.share){
    navigator.share({title:`${ayah.surahName} ${ayah.surah}:${ayah.ayah}`,text:txt}).catch(()=>{});
  } else {
    navigator.clipboard?.writeText(txt).then(()=>{
      const btn=document.getElementById('shareVerseBtn');
      const orig=btn.textContent;
      btn.textContent='✓ Copied!';
      setTimeout(()=>btn.textContent=orig,1500);
    }).catch(()=>alert('Could not copy.'));
  }
}

  '88':{period:'Early Meccan',detail:'Revealed in Mecca. "The Overwhelming Event." Contrasts the faces of the wretched and the blissful on the Day of Judgment.'},
  '89':{period:'Early Meccan',detail:'Revealed in Mecca. Mentions \'Ad, Thamud, and Fir\'awn. Ends with the soul at peace (nafs al-mutma\'innah) entering Paradise.'},
  '90':{period:'Early Meccan',detail:'Revealed in Mecca. "I swear by this city — and you are a resident of this city." Honors the Prophet\'s presence in Mecca.'},
  '91':{period:'Early Meccan',detail:'Revealed in Mecca. "By the sun and its brightness." The story of Thamud and the she-camel. Success is for the one who purifies the soul.'},
  '92':{period:'Early Meccan',detail:'Revealed in Mecca. Contrasts those who give and fear Allah with those who are stingy and deny. Some say it was about Abu Bakr freeing Bilal.'},
  '93':{period:'Early Meccan',detail:'Revealed after a period when revelation paused and the Quraysh taunted the Prophet ﷺ. "Your Lord has not forsaken you."'},
  '94':{period:'Early Meccan',detail:'Revealed in Mecca, closely connected to Ad-Duha. "Did We not expand your breast?" Consolation after hardship.'},
  '95':{period:'Early Meccan',detail:'Revealed in Mecca. "By the fig and the olive." Declares that man was created in the best form (ahsan taqwim).'},
  '96':{period:'First Revelation',detail:'The first five verses were the very first revelation in the Cave of Hira. The Prophet ﷺ was 40 years old. Jibreel commanded: "Read!"'},
  '97':{period:'Early Meccan',detail:'Revealed in Mecca. "The Night of Decree is better than a thousand months." Describes the night the Quran began its descent.'},
  '98':{period:'Medinan',detail:'Revealed in Madinah. Addresses the People of the Book and their response to the clear evidence (bayyinah) sent to them.'},
  '99':{period:'Medinan',detail:'Revealed in Madinah. "When the earth is shaken with its final earthquake." Every atom\'s weight of good and evil will be shown.'},
  '100':{period:'Early Meccan',detail:'Revealed in Mecca. "By the charging horses." Describes man\'s ingratitude toward his Lord.'},
  '101':{period:'Early Meccan',detail:'Revealed in Mecca. "The Striking Calamity" — another name for the Day of Judgment. People scattered like moths.'},
  '102':{period:'Early Meccan',detail:'Revealed in Mecca. "Competition in worldly increase diverts you — until you visit the graves." A warning against materialism.'},
  '103':{period:'Early Meccan',detail:'Revealed in Mecca. Al-Shafi\'i said if people reflected on only this surah, it would suffice them. Man is in loss except those who believe and do good.'},
  '104':{period:'Early Meccan',detail:'Revealed in Mecca. "Woe to every backbiter and slanderer." Said to refer to those who mocked the Prophet ﷺ.'},
  '105':{period:'Early Meccan',detail:'Revealed in Mecca. References the Year of the Elephant (570 CE), the year the Prophet ﷺ was born, when Abraha attacked the Ka\'bah.'},
  '106':{period:'Early Meccan',detail:'Revealed in Mecca. Connected to Al-Fil. The Quraysh\'s trade journeys in winter (Yemen) and summer (Sham) under Allah\'s protection.'},
  '107':{period:'Early Meccan',detail:'Revealed in Mecca. Describes those who deny the religion — they push away orphans and do not encourage feeding the poor.'},
  '108':{period:'Early Meccan',detail:'Revealed in Mecca. "We have granted you Al-Kawthar." Revealed as consolation when the Prophet\'s son died and his enemies called him "cut off."'},
  '109':{period:'Early Meccan',detail:'Revealed in Mecca. The Quraysh proposed alternating worship — this surah was the definitive rejection. "To you your religion, to me mine."'},
  '110':{period:'After Conquest of Mecca (8-10 AH)',detail:'Among the last surahs revealed. Scholars say it signaled the approaching end of the Prophet\'s ﷺ mission and life.'},
  '111':{period:'Early Meccan',detail:'Revealed after Abu Lahab publicly opposed the Prophet ﷺ on Mount Safa, saying "May you perish!" Allah responded.'},
  '112':{period:'Early Meccan',detail:'Revealed in response to the Quraysh asking the Prophet ﷺ to describe his Lord. "Say: He is Allah, the One." Equal to one-third of the Quran.'},
  '113':{period:'Meccan (or Medinan)',detail:'Revealed alongside An-Nas. Known as al-Mu\'awwidhatain (the two seeking refuge). Used for protection against evil.'},
  '114':{period:'Meccan (or Medinan)',detail:'Revealed alongside Al-Falaq. Seeks refuge in Allah from the whisper of the retreating whisperer — shaytan among jinn and men.'},
};

function getSeerahContext(surahNum){
  return SEERAH_MAP[String(surahNum)] || null;
}

// Track study when selecting an ayah
const origSelectAyah = selectAyah;
selectAyah = function(ref){
  origSelectAyah(ref);
  trackStudy();
};

// ========== EVENT BINDINGS ==========
document.getElementById('shareVerseBtn').onclick = shareCurrentVerse;

// Event bindings
els.searchInput.addEventListener('input', () => {
  const q = els.searchInput.value.trim().toLowerCase();
  renderSurahList(state.chapters.filter(ch => String(ch.id).includes(q) || ch.name_simple.toLowerCase().includes(q) || ch.translated_name.toLowerCase().includes(q)));
});
els.translationSelect.addEventListener('change', async () => { state.selectedTranslation = els.translationSelect.value; await loadPage(state.currentPage); if(state.selectedAyah) renderDrawer(); updateHeader(); });
els.reciterSelect.addEventListener('change', () => { state.selectedReciter = els.reciterSelect.value; updateHeader(); });
els.fontMode.addEventListener('change', async () => { await loadPage(state.currentPage); if(state.selectedAyah) renderDrawer(); });
els.themeSelect.addEventListener('change', () => applyTheme(els.themeSelect.value));
document.getElementById('prevPageBtn').onclick = () => loadPage(state.currentPage - 1);
document.getElementById('nextPageBtn').onclick = () => loadPage(state.currentPage + 1);
document.getElementById('goPageBtn').onclick = () => loadPage(Number(els.pageInput.value || state.currentPage));
document.getElementById('playBtn').onclick = async () => { buildQueue(); await playCurrent(); };
document.getElementById('pauseBtn').onclick = pauseAudio;
document.getElementById('stopBtn').onclick = stopAudio;
document.getElementById('nextAyahBtn').onclick = nextAyah;
els.repeatCount.addEventListener('change', () => { els.repeatCount.value = Math.max(1, Math.min(99, Number(els.repeatCount.value || 1))); state.repeatTarget = Number(els.repeatCount.value); });
els.openDrawerBtn.onclick = () => toggleDrawer(true);
document.getElementById('drawerHideBtn').onclick = () => toggleDrawer(false);
document.getElementById('fiveMinBtn').onclick = fiveMinStudy;
document.getElementById('contextBtn').onclick = contextMode;

// ========== LAST READ POSITION ==========
function saveLastRead(){
  try{
    const pos = {surah:state.currentSurah,page:state.currentPage,ayah:state.selectedAyah,ts:Date.now()};
    localStorage.setItem('quran_last_read',JSON.stringify(pos));
  }catch{}
}
function getLastRead(){
  try{ return JSON.parse(localStorage.getItem('quran_last_read')||'null'); }catch{ return null; }
}
// Auto-save position on ayah selection
const origSelectAyah2 = selectAyah;
selectAyah = function(ref){
  origSelectAyah2(ref);
  saveLastRead();
};

// ========== KEYBOARD SHORTCUTS ==========
document.addEventListener('keydown', (e) => {
  // Don't intercept if user is typing in an input/textarea
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT') return;
  switch(e.key){
    case 'ArrowRight': e.preventDefault(); loadPage(state.currentPage - 1); break;
    case 'ArrowLeft': e.preventDefault(); loadPage(state.currentPage + 1); break;
    case 'ArrowDown': e.preventDefault(); {
      const idx = state.pageAyahs.findIndex(a=>`${a.surah}:${a.ayah}`===state.selectedAyah);
      if(idx < state.pageAyahs.length-1){ selectAyah(`${state.pageAyahs[idx+1].surah}:${state.pageAyahs[idx+1].ayah}`); }
    } break;
    case 'ArrowUp': e.preventDefault(); {
      const idx = state.pageAyahs.findIndex(a=>`${a.surah}:${a.ayah}`===state.selectedAyah);
      if(idx > 0){ selectAyah(`${state.pageAyahs[idx-1].surah}:${state.pageAyahs[idx-1].ayah}`); }
    } break;
    case ' ': e.preventDefault(); {
      if(els.audioEl.paused){ buildQueue(); playCurrent(); } else { pauseAudio(); }
    } break;
    case 'Escape': toggleDrawer(false); break;
  }
});

function init(){
  loadStats();
  renderTabs();
  renderSavedCollections();
  applyTheme('dark');
  // Restore last-read position
  const lastRead = getLastRead();
  if(lastRead?.surah) state.currentSurah = lastRead.surah;
  loadMeta().then(() => {
    if(lastRead?.ayah){
      setTimeout(() => {
        selectAyah(lastRead.ayah);
        const ch = state.chapters.find(c=>c.id===lastRead.surah);
        if(ch) els.readerHint.textContent = `Welcome back — continuing from ${ch.name_simple} ${lastRead.ayah}. ← → pages, ↑ ↓ verses, Space play.`;
      }, 500);
    } else {
      els.readerHint.textContent = 'Tap a verse for tafsir. ← → pages, ↑ ↓ verses, Space play/pause.';
    }
  }).catch(err => {
    els.ayahList.innerHTML = `<div class="section"><div class="danger">Failed to load API data. ${escapeHtml(String(err))}</div></div>`;
  });
}
init();
</script>
